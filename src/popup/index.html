<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Recall</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 420px;
      margin: 0;
      padding: 12px;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .result {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    .title {
      font-weight: 600;
    }
    .meta {
      font-size: 12px;
      color: #666;
    }
    .snippet {
      font-size: 13px;
      margin-top: 6px;
    }
    .domain-header {
      margin-top: 12px;
      padding-top: 8px;
      font-weight: 600;
      font-size: 13px;
      color: #444;
      border-top: 1px solid #eee;
    }
    .selected {
    background: rgba(0,0,0,0.06);
    outline: 1px solid #ccc;
    }
    .preview-btn {
      margin-top: 6px;
      padding: 6px 8px;
      font-size: 12px;
    }
    .full-summary {
      white-space: pre-wrap;
      font-size: 13px;
      max-height: 360px;
      overflow-y: auto;
      padding: 8px;
    }


  </style>
</head>
<body>
  <input id="query" placeholder="Recall what you’ve browsed…" />
  <div id="results"></div>

  <script type= "module" src="popup.js"></script>
</body>
</html>

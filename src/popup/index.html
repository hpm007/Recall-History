<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Recall</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 420px;
      margin: 0;
      padding: 12px;
    }
    input {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .result {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    .title {
      font-weight: 600;
    }
    .meta {
      font-size: 12px;
      color: #666;
    }
    .snippet {
      font-size: 13px;
      margin-top: 6px;
    }
    .domain-header {
      margin-top: 12px;
      padding-top: 8px;
      font-weight: 600;
      font-size: 13px;
      color: #444;
      border-top: 1px solid #eee;
    }
    .selected {
    background: rgba(0,0,0,0.06);
    outline: 1px solid #ccc;
    }
    .preview-btn {
      margin-top: 6px;
      padding: 6px 8px;
      font-size: 12px;
    }
    .full-summary {
      white-space: pre-wrap;
      font-family: sans-serif;
      font-size: 13px;
      max-height: 360px;
      overflow-y: auto;
      padding: 8px;
    }
    </style>
  <script type= "module" src="popup.js"></script>
</head>

<body>
  <div id="success" style="display:none; padding:10px; color:green;">
    ✅ You're now on Pro!
  </div>

  <div id="usageContainer" style="padding:10px; font-size:13px;">
    <div id="usageText"></div>
    <div style="background:#eee; height:6px; border-radius:4px; margin-top:4px;">
      <div id="usageBar" style="height:6px; width:0%; background:black; border-radius:4px;"></div>
    </div>
  </div>
  
  <input id="query" placeholder="Recall what you’ve browsed…" />
  <div id="results"></div>

  <div id="upgrade" style="display:none; padding: 12px;">
    <h3>Upgrade to continue</h3>
    <button id="upgradeBtn">Upgrade</button>
  </div>
</body>
</html>
